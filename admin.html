  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

    /* ===== HEADER ===== */
    .topbar {
  height: 60px;
  background:
    linear-gradient(
      90deg,
      rgba(20,10,5,0.95),
      rgba(10,5,5,0.95)
    );
  display: flex;
  align-items: center;
  padding: 0 20px;

  border-bottom: 1px solid rgba(255,80,0,0.3);

  box-shadow:
    0 0 20px rgba(255,60,0,0.3);
}

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
      background: none;
      border: none;
      color: #f8fafc;
    }

    .title {
      margin-left: 15px;
      font-weight: 600;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #020617;
      border-right: 1px solid #1e293b;
      transition: left 0.3s ease;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar li {
      padding: 15px 20px;
      cursor: pointer;
      border-bottom: 1px solid #1e293b;
      transition: background 0.2s;
    }

    .sidebar li:hover {
      background: #1e293b;
    }

    .sidebar li span {
      margin-right: 10px;
    }

    /* ===== CONTENT ===== */
    .content {
  padding: 20px 10px;
  transition: margin-left 0.3s ease;
}

    .content.shift {
      margin-left: 260px;
    }
    
    /* =========================
   TABS VENTAS · ESTADO ACTIVO
========================= */

#ventasViewTabs {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
}

.view-tab {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #0f172a;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
}

.view-tab:hover {
  background: #1e293b;
  color: #fff;
}

.view-tab.active {
  background: linear-gradient(90deg,#ff3b00,#ff6a00);
  color: #fff;
  border: 1px solid rgba(255,80,0,0.5);
  box-shadow: 0 0 12px rgba(255,60,0,0.4);
}

@keyframes pulseTop {
  0%   { box-shadow: 0 0 0px rgba(255,215,0,0.0); }
  50%  { box-shadow: 0 0 18px rgba(255,215,0,0.6); }
  100% { box-shadow: 0 0 0px rgba(255,215,0,0.0); }
}

@keyframes pulseTopAnnual {
  0%   { box-shadow: 0 0 0px rgba(0,200,255,0.0); }
  50%  { box-shadow: 0 0 20px rgba(0,200,255,0.8); }
  100% { box-shadow: 0 0 0px rgba(0,200,255,0.0); }
}

  </style>
</head>

    script.setAttribute("data-appjs", "true");

}

  function toggleMenu() {
    sidebar.classList.toggle("active");
    content.classList.toggle("shift");
  }

  function closeMenu() {
    sidebar.classList.remove("active");
    content.classList.remove("shift");
  }

  // Botón hamburguesa abre y cierra
  menuBtn.onclick = (e) => {
    e.stopPropagation();
    toggleMenu();
  };

  // Cerrar si haces click fuera del menú
  document.addEventListener("click", (e) => {
    if (
      sidebar.classList.contains("active") &&
      !sidebar.contains(e.target) &&
      e.target !== menuBtn
    ) {
      closeMenu();
    }
  });

  // Cerrar al hacer click en una opción
  document.querySelectorAll(".sidebar li").forEach(item => {
  item.addEventListener("click", () => {

    if (item.id === "logoutBtn") return;

    const section = item.dataset.section;
    if (section) {
      loadSection(section);
    }

    closeMenu();
  });
});

  // Logout
  document.getElementById("logoutBtn").onclick = () => {
    localStorage.clear();
    window.location.href = "login.html";
  };
  
  // Cargar Dashboard por defecto al entrar
loadSection("dashboard");

function initAltaCloser() {

  const btnNuevo = document.getElementById("btnNuevoCloser");
  const form = document.getElementById("formAltaCloser");
  const btnCrear = document.getElementById("btnCrearCloser");
  const resultado = document.getElementById("resultadoAlta");
  const resultadoDemo = document.getElementById("resultadoDemo");

  const btnCrearDemo = document.getElementById("btnCrearDemoCloser");

  // Mostrar formulario alta real
  btnNuevo.onclick = () => {
    form.style.display = "block";
  };

  // Crear closer REAL
  btnCrear.onclick = async () => {

    const full_name = document.getElementById("nuevoNombre").value.trim();
    const city = document.getElementById("nuevoMunicipio").value.trim();
    const phone = document.getElementById("nuevoTelefono").value.trim();

    if (!full_name || !city) {
      resultado.style.display = "block";
      resultado.innerHTML = `<p style="color:red;">Nombre y municipio son obligatorios</p>`;
      return;
    }

    btnCrear.disabled = true;
    btnCrear.textContent = "Creando...";

    try {

      const res = await fetch(
        "https://stripe-backend-h1z1.vercel.app/api/create-closer",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name, city, phone })
        }
      );

      const data = await res.json();

      if (!res.ok) {
        resultado.style.display = "block";
        resultado.innerHTML = `<p style="color:red;">${data.error}</p>`;
        btnCrear.disabled = false;
        btnCrear.textContent = "Crear closer";
        return;
      }

      resultado.style.display = "block";
      resultado.innerHTML = `
        <div class="card-credenciales">
          <h3>Closer creado correctamente</h3>
          <p><strong>Usuario:</strong> ${data.username}</p>
          <p><strong>Contraseña:</strong> ${data.password}</p>
          <p class="aviso">⚠ Copia estas credenciales ahora. No volverán a mostrarse.</p>
        </div>
      `;

      setTimeout(() => {
        resultado.style.display = "none";
      }, 3600000);

    } catch {
      resultado.style.display = "block";
      resultado.innerHTML = `<p style="color:red;">Error servidor</p>`;
    }

    btnCrear.disabled = false;
    btnCrear.textContent = "Crear closer";
  };

  // Crear usuario DEMO
btnCrearDemo.onclick = async () => {

  btnCrearDemo.disabled = true;
  btnCrearDemo.textContent = "Creando demo...";

  try {

    const res = await fetch(
      "https://stripe-backend-h1z1.vercel.app/api/create-demo-closer",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({})
      }
    );

    const data = await res.json();

    if (!res.ok) {
      resultadoDemo.style.display = "block";
      resultadoDemo.innerHTML = `<p style="color:red;">${data.error || "Error creando demo"}</p>`;
      return;
    }

    resultadoDemo.style.display = "block";
    resultadoDemo.innerHTML = `
      <div class="card-credenciales">
        <h3>Usuario demo creado</h3>
        <p><strong>Usuario:</strong> ${data.username}</p>
        <p><strong>Contraseña:</strong> ${data.password}</p>
        <p class="aviso">⚠ Funciona hasta que lo elimines manualmente.</p>
      </div>
    `;

  } catch (err) {
    resultadoDemo.style.display = "block";
    resultadoDemo.innerHTML = `<p style="color:red;">Error creando demo</p>`;
  }

  btnCrearDemo.disabled = false;
  btnCrearDemo.textContent = "🧪 Crear usuario demo";
};


}

async function initBajaClosers() {

  const container = document.getElementById("listaBajaClosers");

  try {

    const res = await fetch(
      "https://stripe-backend-h1z1.vercel.app/api/list-baja-closers"
    );

    const closers = await res.json();

    if (!res.ok) {
      container.innerHTML = "<p>Error cargando closers</p>";
      return;
    }

    if (closers.length === 0) {
      container.innerHTML = "<p>No hay closers activos.</p>";
      return;
    }

    container.innerHTML = "";

    closers.forEach(closer => {

      const row = document.createElement("div");
      row.style.display = "flex";
      row.style.alignItems = "center";
      row.style.justifyContent = "space-between";
      row.style.padding = "14px 20px";
      row.style.marginBottom = "12px";
      row.style.background = "rgba(15,10,35,0.85)";
      row.style.borderRadius = "14px";
      row.style.backdropFilter = "blur(10px)";

      const left = document.createElement("div");
      left.innerHTML = `
        <strong>${closer.username}</strong>
        <div style="font-size:12px;opacity:0.7;">ID: ${closer.id}</div>
      `;

      const button = document.createElement("button");
      button.textContent = closer.is_active ? "Dar de baja" : "Volver a dar de alta";
      button.style.padding = "8px 14px";
      button.style.borderRadius = "10px";
      button.style.border = "none";
      button.style.cursor = "pointer";
      button.style.fontWeight = "600";
      button.style.background = closer.is_active
        ? "linear-gradient(90deg,#ff3b00,#ff6a00)"
        : "linear-gradient(90deg,#16a34a,#22c55e)";
      button.style.color = "#fff";

      if (!closer.is_active) {
        const status = document.createElement("div");
        status.textContent = "Dado de baja";
        status.style.fontSize = "12px";
        status.style.color = "#fbbf24";
        status.style.marginTop = "4px";
        left.appendChild(status);
      }

      button.onclick = async () => {

        button.disabled = true;

        await fetch(
          "https://stripe-backend-h1z1.vercel.app/api/toggle-baja-closer",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: closer.id })
          }
        );

        initBajaClosers(); // refresca lista
      };

      row.appendChild(left);
      row.appendChild(button);
      container.appendChild(row);
    });

  } catch {
    container.innerHTML = "<p>Error servidor</p>";
  }
}

      function formatDate(dateString, timeZone) {

  if (!dateString) return { date: "--", time: "--" };

  const dateObj = new Date(dateString);

  const date = dateObj.toLocaleDateString("es-ES", {
    timeZone,
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  });

  const time = dateObj.toLocaleTimeString("es-ES", {
    timeZone,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  return { date, time };
}

function renderMonthlyRanking(ranking) {

  const container = document.getElementById("ventasKPIs");

  const now = new Date();
  const monthName = now.toLocaleString("es-ES", { month: "long" });
  const year = now.getFullYear();

  // 🔒 Si no hay ventas este mes
  if (!ranking || ranking.length === 0) {

    container.innerHTML += `
      <div style="margin-top:30px;margin-bottom:20px;opacity:0.6;">
        <div style="font-size:18px;font-weight:800;margin-bottom:10px;">
          🏆 Ranking mensual · ${monthName} ${year}
        </div>
        <div style="
          padding:20px;
          border-radius:12px;
          background:#0f172a;
          text-align:center;
          font-weight:600;
        ">
          Sin ventas registradas este mes
        </div>
      </div>
    `;

    return;
  }

  // 🔢 Calcular total mensual
  const totalMonthRevenue = ranking.reduce(
    (acc, r) => acc + Number(r.monthly_revenue),
    0
  );

  let html = `
    <div style="margin-top:30px;margin-bottom:20px;">
      <div style="font-size:18px;font-weight:800;margin-bottom:15px;">
        🏆 Ranking mensual · ${monthName} ${year}
      </div>
  `;

  ranking.forEach(r => {

    let medal = "";
    if (r.position === 1) medal = "🥇";
    if (r.position === 2) medal = "🥈";
    if (r.position === 3) medal = "🥉";

    const contribution = totalMonthRevenue > 0
      ? ((r.monthly_revenue / totalMonthRevenue) * 100).toFixed(1)
      : 0;

    html += `
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px 18px;
        margin-bottom:12px;
        border-radius:14px;
        background:${r.position === 1 
          ? "linear-gradient(90deg,#3b2f00,#5b4500)"
          : r.position === 2
          ? "linear-gradient(90deg,#2e2e2e,#4a4a4a)"
          : r.position === 3
          ? "linear-gradient(90deg,#3a1f00,#5a3000)"
          : "#0f172a"};
        ${r.position === 1 ? "animation: pulseTop 2s infinite;" : ""}
      ">

        <div style="font-weight:700;">
          ${medal} ${r.position}. ${r.username}
        </div>

        <div style="font-size:13px;text-align:right;">
          <div><strong>${Number(r.monthly_revenue).toFixed(2)} €</strong></div>
          <div style="opacity:0.7;">
            ${r.monthly_sales} ventas
          </div>
          <div style="opacity:0.6;font-size:12px;">
            ${contribution}% del mes
          </div>
        </div>

      </div>
    `;
  });

  html += `</div>`;

  container.innerHTML += html;
}

// ======================================
// 📊 EJECUTAR COMPARATIVA
// ======================================

async function executeComparison() {

  const monthA = document.getElementById("compareMonthA").value;
  const yearA = document.getElementById("compareYearA").value;
  const monthB = document.getElementById("compareMonthB").value;
  const yearB = document.getElementById("compareYearB").value;
  const closer = document.getElementById("compareCloser").value;

  let url = `https://stripe-backend-h1z1.vercel.app/api/health?type=sales&view=closers`

  url += `&monthA=${monthA}&yearA=${yearA}`;
  url += `&monthB=${monthB}&yearB=${yearB}`;

  if (closer) url += `&closer_id=${closer}`;

  try {

    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      alert("Error en comparativa");
      return;
    }

    renderComparisonResult(data.comparison);

  } catch {
    alert("Error servidor comparativa");
  }
}

function renderComparisonResult(result) {

  const container = document.getElementById("comparisonResult");

  if (!result) {
    container.innerHTML = "<div>Sin datos para comparar</div>";
    return;
  }

  const growthColor = (v) => {
    if (v > 0) return "#22c55e";
    if (v < 0) return "#ef4444";
    return "#9ca3af";
  };

  container.innerHTML = `
    <div style="
      padding:20px;
      border-radius:14px;
      background:#0f172a;
      border:1px solid rgba(255,255,255,0.08);
    ">

      <div style="font-weight:800;margin-bottom:15px;">
        Resultado comparativa
      </div>

      <div>Ventas A: <strong>${result.periodA.total_sales}</strong></div>
      <div>Ventas B: <strong>${result.periodB.total_sales}</strong></div>
      <div style="color:${growthColor(result.growth.sales_growth_percentage)}">
        Variación ventas: ${result.growth.sales_growth_percentage}%
      </div>

      <br>

      <div>Facturación A: <strong>${Number(result.periodA.total_revenue).toFixed(2)} €</strong></div>
      <div>Facturación B: <strong>${Number(result.periodB.total_revenue).toFixed(2)} €</strong></div>
      <div style="color:${growthColor(result.growth.revenue_growth_percentage)}">
        Variación facturación: ${result.growth.revenue_growth_percentage}%
      </div>

      <br>

      <div>Ticket medio A: <strong>${Number(result.periodA.avg_ticket).toFixed(2)} €</strong></div>
      <div>Ticket medio B: <strong>${Number(result.periodB.avg_ticket).toFixed(2)} €</strong></div>
      <div style="color:${growthColor(result.growth.ticket_growth_percentage)}">
        Variación ticket: ${result.growth.ticket_growth_percentage}%
      </div>

    </div>
  `;
}

// ======================================
// 📊 COMPARATIVA AVANZADA CONTROLES
// ======================================

function initComparisonControls() {

  const wrapper = document.getElementById("comparisonWrapper");

  if (currentViewMode !== "closers") {
    wrapper.style.display = "none";
    return;
  }

  wrapper.style.display = "block";

  const toggleBtn = document.getElementById("btnToggleComparison");
  const panel = document.getElementById("comparisonPanel");

  toggleBtn.onclick = () => {
    panel.style.display = panel.style.display === "none" ? "block" : "none";
  };

  const months = [
    "Enero","Febrero","Marzo","Abril","Mayo","Junio",
    "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
  ];

  const monthA = document.getElementById("compareMonthA");
  const monthB = document.getElementById("compareMonthB");
  const yearA = document.getElementById("compareYearA");
  const yearB = document.getElementById("compareYearB");
  const closerSelect = document.getElementById("compareCloser");

  monthA.innerHTML = "";
  monthB.innerHTML = "";

  months.forEach((m,i) => {
    const optA = document.createElement("option");
    optA.value = i+1;
    optA.textContent = m;
    monthA.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = i+1;
    optB.textContent = m;
    monthB.appendChild(optB);
  });

  const currentYear = new Date().getFullYear();

  yearA.innerHTML = "";
  yearB.innerHTML = "";

  for (let y = currentYear; y >= 2023; y--) {
    const opt1 = document.createElement("option");
    opt1.value = y;
    opt1.textContent = y;
    yearA.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = y;
    opt2.textContent = y;
    yearB.appendChild(opt2);
  }

  fetch("https://stripe-backend-h1z1.vercel.app/api/list-closers")
    .then(res => res.json())
    .then(closers => {

      closerSelect.innerHTML = `<option value="">Todos los closers</option>`;

      closers.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.username;
        closerSelect.appendChild(opt);
      });

    });

  document.getElementById("btnExecuteComparison").onclick = executeComparison;

}

// ======================================
// 📊 VISTA ANUAL CONTROLES
// ======================================

function initAnnualControls(initialData) {

  const btn = document.getElementById("btnToggleAnnual");
  const container = document.getElementById("annualContainer");
  const yearSelect = document.getElementById("annualYearSelect");

  const currentYear = new Date().getFullYear();

  // Generar años (actual - 4)
  yearSelect.innerHTML = "";
  for (let i = 0; i < 5; i++) {
    const y = currentYear - i;
    const option = document.createElement("option");
    option.value = y;
    option.textContent = y;
    yearSelect.appendChild(option);
  }

  btn.onclick = async () => {

    if (container.style.display === "none") {

      container.style.display = "block";
      yearSelect.style.display = "inline-block";

      renderAnnual(initialData);

    } else {

      container.style.display = "none";
      yearSelect.style.display = "none";

    }
  };

  yearSelect.onchange = async () => {

    const selectedYear = yearSelect.value;

    const res = await fetch(
      `https://stripe-backend-h1z1.vercel.app/api/health?type=sales&view=closers&year=${selectedYear}`
    );

    const data = await res.json();

    renderAnnual(data);

  };

}

function renderAnnual(data) {

  const container = document.getElementById("annualContainer");

  if (!data.annual_summary) {
    container.innerHTML = "<div>Sin datos anuales</div>";
    return;
  }

  let html = `
    <div style="margin-bottom:20px;">
      <div style="font-weight:800;font-size:18px;margin-bottom:10px;">
        📈 Resumen anual
      </div>
      <div class="kpi-card">
        Ventas: ${data.annual_summary.total_sales}
        <br>
        Facturación: ${Number(data.annual_summary.total_revenue).toFixed(2)} €
      </div>
    </div>
  `;

  // ================= RANKING ANUAL =================

  if (data.annual_ranking.length > 0) {

    html += `
      <div style="margin-bottom:20px;">
        <div style="font-weight:800;font-size:18px;margin-bottom:10px;">
          🏆 Ranking anual
        </div>
    `;

    data.annual_ranking.forEach(r => {

      html += `
        <div style="
          padding:14px 18px;
          margin-bottom:12px;
          border-radius:14px;
          background:#0f172a;
          ${r.position === 1 ? "animation: pulseTopAnnual 2s infinite;" : ""}
        ">
          ${r.position}. ${r.username}
          <br>
          ${Number(r.yearly_revenue).toFixed(2)} € 
          (${r.yearly_sales} ventas)
        </div>
      `;
    });

    html += `</div>`;
  }

  // ================= DESGLOSE MENSUAL =================

  if (data.annual_monthly_breakdown.length > 0) {

    html += `
      <div>
        <div style="font-weight:800;font-size:18px;margin-bottom:10px;">
          📅 Desglose mensual
        </div>
    `;

    data.annual_monthly_breakdown.forEach(m => {

      html += `
        <div class="kpi-card" style="margin-bottom:10px;">
          Mes ${m.month} → 
          ${m.total_sales} ventas — 
          ${Number(m.total_revenue).toFixed(2)} €
        </div>
      `;
    });

    html += `</div>`;
  }

  container.innerHTML = html;
}

// ======================================
// 🔄 REFRESH SOLO ONLINE / OFFLINE
// ======================================

async function refreshOnlineStatus() {

  try {

    const res = await fetch(
      "https://stripe-backend-h1z1.vercel.app/api/list-closers"
    );

    const closers = await res.json();

    closers.forEach(closer => {

      const dot = document.querySelector(
        `[data-online-dot="${closer.id}"]`
      );

      const text = document.querySelector(
        `[data-online-text="${closer.id}"]`
      );

      if (dot && text) {
        dot.style.background = closer.online ? "#22c55e" : "#6b7280";
        text.textContent = closer.online ? "Online" : "Offline";
      }

    });

  } catch (err) {
    console.error("Error refrescando estado online");
  }

}

// Iniciar intervalo SOLO UNA VEZ
if (!window.onlineInterval) {
  window.onlineInterval = setInterval(refreshOnlineStatus, 5000);
}
